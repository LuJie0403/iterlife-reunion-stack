name: iterlife-reunion
services:
  iterlife-reunion-api:
    build:
      context: /apps/iterlife-reunion
    container_name: iterlife-reunion-api
    env_file:
      - /apps/config/iterlife-reunion/backend.env
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      iterlife-reunion-meili:
        condition: service_started
    ports:
      - "127.0.0.1:18080:8080"
    networks:
      - iterlife-reunion-net

  iterlife-reunion-ui:
    build:
      context: /apps/iterlife-reunion-ui
    container_name: iterlife-reunion-ui
    env_file:
      - /apps/config/iterlife-reunion/ui.env
    restart: unless-stopped
    depends_on:
      iterlife-reunion-api:
        condition: service_started
    ports:
      - "127.0.0.1:13080:3000"
    networks:
      - iterlife-reunion-net

  iterlife-reunion-meili:
    image: getmeili/meilisearch:v1.10
    container_name: iterlife-reunion-meili
    restart: unless-stopped
    environment:
      - MEILI_NO_ANALYTICS=true
      # Read from host environment to avoid hardcoded secrets in repository.
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-CHANGE_ME}
    volumes:
      - /apps/data/iterlife-reunion/meili:/meili_data
    ports:
      - "127.0.0.1:17700:7700"
    networks:
      - iterlife-reunion-net

networks:
  iterlife-reunion-net:
    driver: bridge
